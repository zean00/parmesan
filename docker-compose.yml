services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: parmesan
      POSTGRES_PASSWORD: parmesan
      POSTGRES_DB: parmesan
    ports:
      - "5432:5432"
    volumes:
      - parmesan-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  parmesan-postgres:
