services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: parmesan
      POSTGRES_PASSWORD: parmesan
      POSTGRES_DB: parmesan
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parmesan -d parmesan"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - parmesan-postgres:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      target: backend
    command: ["/app/migrate"]
    environment:
      PARMESAN_CONFIG: /config/parmesan.yaml
      DATABASE_URL: ${DATABASE_URL:-postgres://parmesan:parmesan@postgres:5432/parmesan?sslmode=disable}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY:-change-me-32-byte-development-key}
      OPERATOR_API_KEY: ${OPERATOR_API_KEY:-dev-operator}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
    depends_on:
      postgres:
        condition: service_healthy

  bootstrap:
    build:
      context: .
      target: backend
    command: ["/app/bootstrap"]
    environment:
      PARMESAN_CONFIG: /config/parmesan.yaml
      DATABASE_URL: ${DATABASE_URL:-postgres://parmesan:parmesan@postgres:5432/parmesan?sslmode=disable}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY:-change-me-32-byte-development-key}
      OPERATOR_API_KEY: ${OPERATOR_API_KEY:-dev-operator}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    build:
      context: .
      target: backend
    command: ["/app/api"]
    restart: unless-stopped
    environment:
      PARMESAN_CONFIG: /config/parmesan.yaml
      HTTP_ADDR: :8080
      DATABASE_URL: ${DATABASE_URL:-postgres://parmesan:parmesan@postgres:5432/parmesan?sslmode=disable}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY:-change-me-32-byte-development-key}
      OPERATOR_API_KEY: ${OPERATOR_API_KEY:-dev-operator}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
    ports:
      - "${PARMESAN_API_PORT:-8080}:8080"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    build:
      context: .
      target: backend
    command: ["/app/worker"]
    restart: unless-stopped
    environment:
      PARMESAN_CONFIG: /config/parmesan.yaml
      HTTP_ADDR: :8082
      DATABASE_URL: ${DATABASE_URL:-postgres://parmesan:parmesan@postgres:5432/parmesan?sslmode=disable}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY:-change-me-32-byte-development-key}
      OPERATOR_API_KEY: ${OPERATOR_API_KEY:-dev-operator}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
    depends_on:
      bootstrap:
        condition: service_completed_successfully

  dashboard:
    build:
      context: .
      target: dashboard
    restart: unless-stopped
    ports:
      - "${PARMESAN_DASHBOARD_PORT:-4173}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  nexus:
    profiles: ["nexus"]
    image: ${NEXUS_IMAGE:-nexus:latest}
    restart: unless-stopped
    environment:
      ACP_BASE_URL: http://api:8080
      ACP_TOKEN: ${OPERATOR_API_KEY:-dev-operator}
    ports:
      - "${NEXUS_PORT:-8095}:8080"
    depends_on:
      api:
        condition: service_started

volumes:
  parmesan-postgres:
