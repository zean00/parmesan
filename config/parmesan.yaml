http:
  address: ":8080"

database:
  url: "${DATABASE_URL}"

secrets:
  master_key: "${SECRETS_MASTER_KEY}"

providers:
  openrouter_api_key: "${OPENROUTER_API_KEY}"
  openrouter_base_url: "${OPENROUTER_BASE_URL}"
  default_reasoning: openrouter
  default_structured: openrouter
  default_embedding: openrouter
  maintainer_reasoning: openrouter
  maintainer_structured: openrouter
  maintainer_embedding: openrouter

operator:
  api_key: "${OPERATOR_API_KEY}"
  default_operator_id: dev_operator
  default_operator_roles: operator

knowledge:
  root: /knowledge

customer_context:
  enrichment:
    enabled: false
    timeout_seconds: 2
    on_error: continue
    sources: []

moderation:
  alerts:
    enabled: false
    notify_on_censored: true
    notify_on_jailbreak: true
    notify_categories: []

bootstrap:
  agents_dir: /agents

acp:
  response_coalesce_ms: 1500
  delegation_timeout_seconds: 30

agent_servers:
  # OpenCode:
  #   command: opencode
  #   args: ["acp", "--pure"]
  #   startup_timeout_seconds: 10
  #   request_timeout_seconds: 30

mcp:
  providers: []

observability:
  metrics_address: ":9090"
  org_id: default

runtime:
  async_write_queue_size: 256
  request_timeout_seconds: 15
  retry_model_profiles: []
