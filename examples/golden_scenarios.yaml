version: v1alpha1
description: >
  Draft golden scenarios for Parmesan parity testing against Parlant. These
  scenarios are derived from Parlant stable baseline features, stable matcher
  tests, and embedded shot libraries. The focus is normalized policy/runtime
  decisions first, with final response checks as secondary assertions.

normalization:
  compare:
    - matched_observations
    - matched_guidelines
    - suppressed_guidelines
    - suppression_reasons
    - active_journey
    - active_journey_node
    - journey_decision
    - next_journey_node
    - resolution_records
    - projected_follow_ups
    - legal_follow_ups
    - exposed_tools
    - tool_candidates
    - overlapping_tool_groups
    - selected_tool
    - response_mode
    - no_match
    - selected_template
    - verification_outcome
  notes:
    - Final text should be checked semantically, not by exact string equality.
    - Tool side effects should be replayed from stored tool results where possible.
    - Source references point to the original Parlant files used to derive each case.
    - Some decision-level scenarios are expectation-authoritative when the live Parlant helper cannot expose equivalent internal state reliably.

scenarios:
  - id: journey_reset_password_start
    title: Reset password journey starts and asks the first missing field
    category: journey
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/features/baseline/journeys.feature
    transcript:
      - role: customer
        text: I want to reset my password
    expectations:
      matched_guidelines:
        - journey:Reset Password Journey
      active_journey:
        id: Reset Password Journey
      journey_decision: start
      next_journey_node: ask_account_name
      response_mode: guided
      no_match: false
      response_semantics:
        must_include:
          - ask for username or account name
        must_not_include:
          - ask for email
          - ask for phone number

  - id: journey_irrelevant_password_question
    title: Password advice should not activate reset-password journey
    category: journey
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/features/baseline/journeys.feature
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/features/baseline/strict_canned_responses.feature
    transcript:
      - role: customer
        text: What are some tips I could use to come up with a strong password?
    expectations:
      matched_guidelines: []
      active_journey: null
      journey_decision: ignore
      no_match: false
      response_semantics:
        must_not_include:
          - reset your password
          - username
          - email address attached to your account

  - id: journey_book_taxi_backtrack_due_to_changed_plan
    title: Taxi booking journey backtracks when the customer changes the booking subject
    category: journey_backtrack
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/features/baseline/journeys.feature
      - /home/sahal/workspace/agents/parlant/src/parlant/core/engines/alpha/guideline_matching/generic/journey/journey_backtrack_node_selection.py
    prior_state:
      active_journey: Book Taxi Ride
      journey_path:
        - ask_pickup_location
        - ask_dropoff_location
        - ask_pickup_time
    transcript:
      - role: customer
        text: Hi, I'd like to book a taxi for myself
      - role: agent
        text: Great! What's your pickup location?
      - role: customer
        text: Main street 1234
      - role: agent
        text: Got it. What's your drop-off location?
      - role: customer
        text: 3rd Avenue by the river
      - role: agent
        text: Got it. What time would you like to pick up?
      - role: customer
        text: Oh hold up, my plans have changed. I'm actually going to need a cab for my son, he'll be waiting at JFK airport, at the taxi stand.
    expectations:
      active_journey:
        id: Book Taxi Ride
      journey_decision: backtrack
      next_journey_node: ask_dropoff_location

  - id: journey_custom_branch_backtrack_to_earlier_choice
    title: Journey backtracks to the earlier branch point when the customer changes a prior fulfillment choice
    category: journey_backtrack
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/test_journey_node_selection.py
    prior_state:
      active_journey: Order Fulfillment
      journey_path:
        - choose_method
        - ask_address
        - ask_time
    transcript:
      - role: customer
        text: Actually let's switch this to store pickup
    policy_setup:
      journeys:
        - id: Order Fulfillment
          when:
            - order
          root_id: choose_method
          states:
            - id: choose_method
              type: message
              instruction: Ask whether they want delivery or pickup
            - id: ask_address
              type: message
              instruction: Ask for the delivery address
              when:
                - delivery
            - id: ask_time
              type: message
              instruction: Ask for delivery time
              when:
                - delivery
            - id: ask_store
              type: message
              instruction: Ask which store they want
              when:
                - pickup
                - store
          edges:
            - id: edge_choose_address
              source: choose_method
              target: ask_address
              condition: delivery
            - id: edge_choose_store
              source: choose_method
              target: ask_store
              condition: pickup or store
            - id: edge_address_time
              source: ask_address
              target: ask_time
    expectations:
      matched_guidelines:
        - journey:Order Fulfillment
      active_journey:
        id: Order Fulfillment
      journey_decision: backtrack
      next_journey_node: choose_method

  - id: journey_custom_backtrack_and_fast_forward
    title: Journey backtracks to the changed step and fast-forwards through already satisfied follow-ups
    category: journey_backtrack
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/test_journey_node_selection.py
    prior_state:
      active_journey: Calzone Journey
      journey_path:
        - ask_quantity
        - ask_type
        - ask_size
        - ask_drinks
        - check_stock
    transcript:
      - role: customer
        text: Actually, can I change those to medium size instead of large? No drinks still.
    policy_setup:
      journeys:
        - id: Calzone Journey
          when:
            - order calzones
          root_id: ask_quantity
          states:
            - id: ask_quantity
              type: message
              instruction: Ask how many calzones they want
            - id: ask_type
              type: message
              instruction: Ask what type of calzones they want
              when:
                - classic italian
                - spinach
                - chicken
            - id: ask_size
              type: message
              instruction: Ask what size they want
              when:
                - small
                - medium
                - large
            - id: ask_drinks
              type: message
              instruction: Ask whether they want any drinks
              when:
                - drinks
                - no drinks
            - id: check_stock
              type: tool
              tool: local:check_stock
              instruction: Check stock for the selected calzones
          edges:
            - source: __journey_root__
              target: ask_quantity
            - source: ask_quantity
              target: ask_type
            - source: ask_type
              target: ask_size
            - source: ask_size
              target: ask_drinks
            - source: ask_drinks
              target: check_stock
      tools:
        - id: local:check_stock
          consequential: true
          schema:
            type: object
            properties:
              session_id:
                type: string
            required:
              - session_id
      staged_tool_calls:
        - tool_id: local:check_stock
          arguments:
            session_id: sess_1
          result:
            data:
              all_available: true
    expectations:
      matched_guidelines:
        - journey:Calzone Journey
      active_journey:
        id: Calzone Journey
      journey_decision: backtrack
      next_journey_node: check_stock

  - id: journey_book_flight_skip_answered_steps
    title: Journey skips already satisfied steps and asks the next unresolved question
    category: journey_progress
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/features/baseline/journeys.feature
      - /home/sahal/workspace/agents/parlant/src/parlant/core/engines/alpha/guideline_matching/generic/journey/journey_next_step_selection.py
    prior_state:
      active_journey: Book Flight
      journey_path:
        - ask_origin
    transcript:
      - role: customer
        text: Hi, my name is John Smith and I'd like to book a flight for myself from Ben Gurion airport. We flight in the 12.10 and return in the 17.10.
      - role: agent
        text: Hi John, thanks for reaching out! I see you're planning to fly from Ben Gurion airport. Could you please let me know your destination airport?
      - role: customer
        text: Suvarnabhumi Airport, please
    expectations:
      active_journey:
        id: Book Flight
      journey_decision: advance
      next_journey_node: ask_class

  - id: journey_dependency_guideline_under_21
    title: Journey activation enables dependent age-based flight guideline
    category: journey_relationship
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/features/baseline/journeys.feature
    transcript:
      - role: customer
        text: Hi, my name is John Smith and I'd like to book a flight for myself from Ben Gurion airport to JFK. We flight in the 12.10 and return in the 17.10. I'm 19 if that affects anything.
    policy_setup:
      extra_guidelines:
        - id: under_21
          kind: actionable
          condition: customer wants to book a flight and the traveler is under 21
          action: inform the customer that only economy class is available
        - id: age_21_or_older
          kind: actionable
          condition: customer wants to book a flight and the traveler is 21 or older
          action: tell the customer they may choose between economy and business class
      relationships:
        - kind: dependency
          source: under_21
          target: journey:Book Flight
        - kind: dependency
          source: age_21_or_older
          target: journey:Book Flight
    expectations:
      matched_guidelines:
        - journey:Book Flight
        - under_21
      suppressed_guidelines:
        - age_21_or_older
      response_semantics:
        must_include:
          - only economy class is available

  - id: relationship_entailment_howdy_good_sir
    title: Entailed guideline should be applied with the source guideline
    category: relationships
    agent_job: sell pizza
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/features/baseline/relationships.feature
    transcript:
      - role: customer
        text: Hi
    policy_setup:
      extra_guidelines:
        - id: howdy
          kind: actionable
          condition: the customer says hello
          action: greet the customer with "Howdy"
        - id: good_sir
          kind: actionable
          condition: saying "Howdy"
          action: add "good sir"
      relationships:
        - kind: entails
          source: howdy
          target: good_sir
    expectations:
      matched_guidelines:
        - howdy
        - good_sir
      suppression_reasons: []
      response_semantics:
        must_include:
          - Howdy
          - good sir

  - id: previously_applied_customer_dependent_still_waiting
    title: Customer-dependent guideline stays active until the customer completes their side
    category: previously_applied_customer_dependent
    timeout_seconds: 180
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/test_previously_applied_actionable_customer_dependent_batch.py
    transcript:
      - role: customer
        text: Hi, I’d like to book a table for tomorrow night.
      - role: agent
        text: Sure! Would you prefer to sit inside or outside?
      - role: customer
        text: 7 PM would be great.
    policy_setup:
      extra_guidelines:
        - id: reservation_location
          kind: actionable
          condition: customer wants to make a reservation
          action: check if they prefer inside or outside
          customer_dependent: true
    expectations:
      matched_guidelines:
        - reservation_location
      response_analysis:
        still_required:
          - reservation_location
      response_semantics:
        must_include:
          - inside or outside

  - id: previously_applied_customer_dependent_completed
    title: Customer-dependent guideline should not reapply after the customer answers
    category: previously_applied_customer_dependent
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/test_previously_applied_actionable_customer_dependent_batch.py
    transcript:
      - role: customer
        text: Hi, I’d like to book a table for tomorrow night.
      - role: agent
        text: Sure! Would you prefer to sit inside or outside?
      - role: customer
        text: I prefer it outside, thanks
    policy_setup:
      extra_guidelines:
        - id: reservation_location
          kind: actionable
          condition: customer wants to make a reservation
          action: check if they prefer inside or outside
          customer_dependent: true
    expectations:
      matched_guidelines: []
      response_analysis:
        already_satisfied:
          - reservation_location
        satisfaction_sources:
          reservation_location: customer_answer

  - id: disambiguation_lost_card
    title: Lost-card request should prefer the clarified lost-card action set instead of unrelated card actions
    category: disambiguation
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/test_disambiguation_batch.py
    transcript:
      - role: customer
        text: I lost my card
    policy_setup:
      extra_guidelines:
        - id: report_lost
          kind: actionable
          condition: the customer wants to report a card lost
          action: report card lost
        - id: lock_card
          kind: actionable
          condition: the customer wants to lock their card
          action: do locking
        - id: replacement_card
          kind: actionable
          condition: the customer requests a replacement card
          action: order them a new card
    expectations:
      disambiguation_required: true
      matched_guidelines:
        - report_lost
      suppressed_guidelines:
        - lock_card
        - replacement_card

  - id: strict_no_match_without_valid_template
    title: Strict canned mode should emit no-match instead of fabricating a response
    category: strict_canned
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/features/baseline/strict_canned_responses.feature
    mode: strict
    transcript:
      - role: customer
        text: Man it's hard to make ends meet. Do you have any advice?
    policy_setup:
      extra_guidelines:
        - id: savings_options
          kind: actionable
          condition: customer asks how to save money
          action: talk about savings options
      canned_responses:
        - "Your account balance is {{balance}}"
    expectations:
      response_mode: strict
      no_match: true
      selected_template: null

  - id: strict_tool_result_template_fill
    title: Strict canned mode should use tool data to fill the selected template
    category: strict_canned_tool_fill
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/features/baseline/strict_canned_responses.feature
    mode: strict
    transcript:
      - role: customer
        text: What are the requirements for the developer position?
    policy_setup:
      extra_guidelines:
        - id: retrieve_qualification_info
          kind: actionable
          condition: asked about position qualifications
          action: explain qualification criteria
      tools:
        - id: local:get_qualification_info
      associations:
        - guideline: retrieve_qualification_info
          tool: local:get_qualification_info
      canned_responses:
        - "In terms of years of experience, the requirement is {{qualification_info}}."
    expectations:
      exposed_tools:
        - local:get_qualification_info
      selected_tool: local:get_qualification_info
      response_mode: strict
      no_match: false
      response_semantics:
        must_include:
          - 5+ years of experience

  - id: tool_from_entailed_guideline
    title: Tool exposure should include tools from an entailed guideline
    category: tools_relationships
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/features/baseline/tools.feature
    transcript:
      - role: customer
        text: What pizza topping should I take?
    policy_setup:
      extra_guidelines:
        - id: suggest_toppings
          kind: actionable
          condition: customer asks for topping recommendations
          action: suggest pineapple
        - id: check_stock
          kind: actionable
          condition: suggesting products
          action: check if the product is available in stock, and only suggest it if it is
      relationships:
        - kind: entails
          source: suggest_toppings
          target: check_stock
      tools:
        - id: local:get_available_toppings
      associations:
        - guideline: check_stock
          tool: local:get_available_toppings
    expectations:
      matched_guidelines:
        - suggest_toppings
        - check_stock
      exposed_tools:
        - local:get_available_toppings
      selected_tool: local:get_available_toppings
      response_semantics:
        must_not_include:
          - pineapple

  - id: relational_priority_chain_hello
    title: Priority relationship should leave only the higher-priority greeting guideline active
    category: relational_resolver
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/test_relational_resolver.py
    transcript:
      - role: customer
        text: Hello there and I need followup help
    policy_setup:
      extra_guidelines:
        - id: greet_howdy
          kind: actionable
          condition: customer says hello
          action: say Howdy
          priority: 30
        - id: greet_hi
          kind: actionable
          condition: customer says hello
          action: say Hi
          priority: 20
      relationships:
        - kind: priority
          source: greet_howdy
          target: greet_hi
    expectations:
      matched_guidelines:
        - greet_howdy
      suppressed_guidelines:
        - greet_hi
      resolution_records:
        - entity_id: greet_howdy
          kind: none
        - entity_id: greet_hi
          kind: deprioritized

  - id: relational_numerical_priority_guideline_over_journey
    title: Higher numerical priority guideline should suppress an active lower-priority journey
    category: relational_resolver
    transcript:
      - role: customer
        text: customer asks about drinks
    policy_setup:
      extra_guidelines:
        - id: standalone
          kind: actionable
          condition: customer asks about drinks
          action: Recommend sparkling water
          priority: 20
      journeys:
        - id: Drink Recommendation Journey
          when:
            - customer asks about drinks
          priority: 5
          states:
            - id: ask_drink
              type: message
              instruction: Ask what drink they want
    expectations:
      matched_guidelines:
        - standalone
      suppressed_guidelines:
        - journey_node:Drink Recommendation Journey:ask_drink
      resolution_records:
        - entity_id: journey:Drink Recommendation Journey
          kind: deprioritized

  - id: relational_numerical_priority_journey_over_guideline
    title: Higher numerical priority active journey should suppress a lower-priority guideline
    category: relational_resolver
    transcript:
      - role: customer
        text: customer asks about drinks
    policy_setup:
      extra_guidelines:
        - id: standalone
          kind: actionable
          condition: customer asks about drinks
          action: Recommend water
          priority: 5
      journeys:
        - id: Drink Recommendation Journey
          when:
            - customer asks about drinks
          priority: 20
          states:
            - id: ask_drink
              type: message
              instruction: Ask what drink they want
    expectations:
      matched_guidelines:
        - journey:Drink Recommendation Journey
      suppressed_guidelines:
        - standalone
      active_journey:
        id: Drink Recommendation Journey
      resolution_records:
        - entity_id: standalone
          kind: deprioritized

  - id: journey_projection_book_flight_followups
    title: Projected Book Flight journey nodes should expose valid follow-up projected ids
    category: journey_projection
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/test_journey_guideline_projection.py
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/test_journey_node_selection.py
    transcript:
      - role: customer
        text: I want to book a flight
    expectations:
      matched_guidelines:
        - journey:Book Flight
      active_journey:
        id: Book Flight
      projected_follow_ups:
        journey_node:Book Flight:ask_origin:
          - journey_node:Book Flight:ask_destination:Book Flight:ask_origin->ask_destination
        journey_node:Book Flight:ask_destination:Book Flight:ask_origin->ask_destination:
          - journey_node:Book Flight:ask_dates:Book Flight:ask_destination->ask_dates
        journey_node:Book Flight:ask_dates:Book Flight:ask_destination->ask_dates:
          - journey_node:Book Flight:ask_class:Book Flight:ask_dates->ask_class
        journey_node:Book Flight:ask_class:Book Flight:ask_dates->ask_class:
          - journey_node:Book Flight:ask_name:Book Flight:ask_class->ask_name
      legal_follow_ups:
        journey_node:Book Flight:ask_origin:
          - journey_node:Book Flight:ask_destination:Book Flight:ask_origin->ask_destination
        journey_node:Book Flight:ask_destination:Book Flight:ask_origin->ask_destination:
          - journey_node:Book Flight:ask_dates:Book Flight:ask_destination->ask_dates
        journey_node:Book Flight:ask_dates:Book Flight:ask_destination->ask_dates:
          - journey_node:Book Flight:ask_class:Book Flight:ask_dates->ask_class
        journey_node:Book Flight:ask_class:Book Flight:ask_dates->ask_class:
          - journey_node:Book Flight:ask_name:Book Flight:ask_class->ask_name

  - id: response_analysis_discount_already_applied
    title: Response analysis should mark the discount guideline as already satisfied once it was already offered
    category: response_analysis
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/test_generic_response_analysis.py
    transcript:
      - role: customer
        text: My order is late again.
      - role: agent
        text: I'm sorry about that. I'll give you a discount on this order.
      - role: customer
        text: Thanks, but where is it now?
    policy_setup:
      extra_guidelines:
        - id: late_so_discount
          kind: actionable
          condition: customer complains that they didn't get the order on time
          action: offer a discount
          track: true
    expectations:
      response_analysis:
        already_satisfied:
          - late_so_discount
        satisfaction_sources:
          late_so_discount: assistant_message

  - id: response_analysis_discount_partially_applied
    title: Response analysis should keep a tracked guideline live when only part of the action was already performed
    category: response_analysis
    source_refs:
      - /home/sahal/workspace/agents/parmesan/internal/runtime/policy/runtime_test.go
    transcript:
      - role: customer
        text: My order is late again.
      - role: agent
        text: I'm sorry about that.
      - role: customer
        text: Okay, what happens next?
    policy_setup:
      extra_guidelines:
        - id: late_so_discount
          kind: actionable
          condition: customer complains that they didn't get the order on time
          action: Apologize and offer a discount.
          track: true
    expectations:
      response_analysis:
        still_required:
          - late_so_discount
        partially_applied:
          - late_so_discount
        satisfaction_sources:
          late_so_discount: assistant_message

  - id: tool_overlap_lock_card_choice
    title: Overlapping card-control tools should keep both candidates visible but choose lock_card for a locking request
    category: tool_calling
    source_refs:
      - /home/sahal/workspace/agents/parlant/tests/core/stable/engines/alpha/test_tool_caller.py
    transcript:
      - role: customer
        text: Please lock my card right now. I think I misplaced it.
    policy_setup:
      extra_guidelines:
        - id: card_help
          kind: actionable
          condition: customer has a card issue
          action: help with a card problem
        - id: lock_requested
          kind: actionable
          condition: customer wants to lock their card
          action: lock the card for the customer
      tools:
        - id: local:try_unlock_card
          overlap_group: card_controls
          schema:
            type: object
            properties:
              session_id:
                type: string
            required:
              - session_id
        - id: local:lock_card
          overlap_group: card_controls
          consequential: true
          schema:
            type: object
            properties:
              session_id:
                type: string
            required:
              - session_id
      associations:
        - guideline: card_help
          tool: local:try_unlock_card
        - guideline: lock_requested
          tool: local:lock_card
    expectations:
      tool_candidates:
        - local:lock_card
        - local:try_unlock_card
      tool_candidate_states:
        local:lock_card: selected
        local:try_unlock_card: rejected_overlap
      tool_candidate_rejected_by:
        local:try_unlock_card: local:lock_card
      overlapping_tool_groups:
        - - local:lock_card
          - local:try_unlock_card
      selected_tool: local:lock_card

  - id: tool_reference_motorcycle_price_specialized_choice
    title: A specialized motorcycle price tool should beat a generic vehicle price tool for a motorcycle request
    category: tool_calling
    source_refs:
      - /home/sahal/workspace/agents/parlant/src/parlant/core/engines/alpha/tool_calling/single_tool_batch.py
    transcript:
      - role: customer
        text: What's your price for a Harley-Davidson Street Glide motorcycle?
    policy_setup:
      extra_guidelines:
        - id: vehicle_price
          kind: actionable
          condition: customer asks for the price of a vehicle
          action: check the vehicle price
      tools:
        - id: local:check_vehicle_price
          description: check generic vehicle price
          overlap_group: vehicle_price
          consequential: true
          schema:
            type: object
            properties:
              model:
                type: string
            required:
              - model
        - id: local:check_motorcycle_price
          description: check motorcycle price
          overlap_group: vehicle_price
          consequential: true
          schema:
            type: object
